# 构建配置

$dist: "dist";
$main: "dist/main";

files:
  - "${dist}/renderer/**/*"
  - "${main}/**/*"
  - "package.json"

extraMetadata:
  main: "${main}/main.js"

directories:
  output: "release"
  buildResources: "build"

win:
  icon: "build/icon.ico"
  target:
    - target: nsis
      arch:
        - x64
        - ia32
    - target: portable
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "FileGuardian"
  installerIcon: "build/icon.ico"
  uninstallerIcon: "build/icon.ico"
  installerHeaderIcon: "build/icon.ico"
  deleteAppDataOnUninstall: false

mac:
  icon: "build/icon.icns"
  category: "public.app-category.utilities"
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  hardenedRuntime: true
  gatekeeperAssess: false

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: "link"
      path: "/Applications"

linux:
  icon: "build/icons"
  category: "Utility"
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  maintainer: "FileGuardian Team"
  desktop:
    Name: "FileGuardian"
    Comment: "企业级文件自动备份与对比工具"
    Categories: "Utility;FileTools;"
